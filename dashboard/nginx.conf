# ─── Rate limit zones (must be declared at http{} scope, which nginx's
#     default /etc/nginx/nginx.conf already opens for any conf.d/*.conf
#     included file. These are global per-IP limiters applied inside the
#     location blocks below.)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# WebSocket upgrade passthrough helper
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Hide the nginx version banner
server_tokens off;

# HTTP server — serves the dashboard and proxies API requests
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Global request-body ceiling (SPA + API). 20M is high enough for
    # file uploads flowing through the API but low enough to blunt
    # amplification / DoS.
    client_max_body_size 20M;
    client_body_timeout  30s;
    client_header_timeout 15s;
    large_client_header_buffers 4 16k;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    # HSTS — tell browsers to always use HTTPS for this origin.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable powerful browser features the dashboard doesn't use.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
    # CSP — `frame-ancestors 'none'` is the CSP equivalent of X-Frame-Options
    # and is what modern browsers honour. `base-uri 'self'` and
    # `form-action 'self'` mitigate injection-driven redirection.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Per-IP concurrent connection cap (global across this server).
    limit_conn api_conn 50;

    # Frontend routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth endpoints — strict rate limit to blunt credential stuffing.
    location ~ ^/api/v1/auth/(login|register|refresh|forgot) {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://manager:55000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite, do not append. Prevents client-supplied XFF spoofing
        # from reaching anything downstream that might trust it.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }

    # General API proxy
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://manager:55000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite to prevent XFF spoofing.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# HTTPS: To enable TLS, mount certs and add nginx-ssl.conf to /etc/nginx/conf.d/
# See dashboard/nginx-ssl.conf for the HTTPS server block.
