# CyberSentinel DLP - Deployment Compose File
# Uses pre-built images from GHCR. No source code or build step needed.
# Usage: docker compose -f docker-compose.deploy.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cybersentineldlp-postgres
    networks:
      - cybersentineldlp-net
    # SECURITY: data tier is internal only — no host port binding.
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: dlp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: cybersentineldlp
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlp_user -h postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: cybersentineldlp-mongodb
    networks:
      - cybersentineldlp-net
    security_opt:
      - no-new-privileges:true
    environment:
      MONGO_INITDB_ROOT_USERNAME: dlp_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:?MONGODB_PASSWORD must be set}
      MONGO_INITDB_DATABASE: cybersentineldlp
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cybersentineldlp-redis
    networks:
      - cybersentineldlp-net
    security_opt:
      - no-new-privileges:true
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # OpenSearch (Event Storage & Search)
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: cybersentineldlp-opensearch
    networks:
      - cybersentineldlp-net
    # SECURITY: OpenSearch security plugin is ENABLED.
    # 9200/9600 are internal only — no host port exposure.
    security_opt:
      - no-new-privileges:true
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set}
      - plugins.security.disabled=false
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk -u admin:${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set} https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # DLP Manager (FastAPI Backend)
  manager:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-manager
    networks:
      - cybersentineldlp-net
    ports:
      - "55000:55000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - PORT=55000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=dlp_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=cybersentineldlp
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=dlp_user
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DB=cybersentineldlp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set}
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_VERIFY_CERTS=false
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI:-}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID:-common}
    volumes:
      - manager_logs:/var/log/cybersentineldlp
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-celery-worker
    networks:
      - cybersentineldlp-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=dlp_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=cybersentineldlp
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=dlp_user
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DB=cybersentineldlp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set}
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_VERIFY_CERTS=false
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI:-}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID:-common}
    volumes:
      - manager_logs:/var/log/cybersentineldlp
    command: celery -A app.tasks.reporting_tasks worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat
  celery-beat:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-celery-beat
    networks:
      - cybersentineldlp-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=dlp_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=cybersentineldlp
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=dlp_user
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DB=cybersentineldlp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set}
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_VERIFY_CERTS=false
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI:-}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID:-common}
    volumes:
      - manager_logs:/var/log/cybersentineldlp
    command: celery -A app.tasks.reporting_tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Dashboard (React + Nginx)
  dashboard:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-dashboard:latest
    container_name: cybersentineldlp-dashboard
    networks:
      - cybersentineldlp-net
    ports:
      - "3000:3000"
    depends_on:
      manager:
        condition: service_started
    restart: unless-stopped

networks:
  cybersentineldlp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
  manager_logs:
    driver: local
