services:
  # OpenSearch for event storage
  opensearch:
    # 2.19.x, NOT 2.11: OPENSEARCH_INITIAL_ADMIN_PASSWORD is only honoured from
    # 2.12 onward. On 2.11 it was silently ignored, so OpenSearch kept its
    # built-in admin/admin while the manager authenticated with the password from
    # .env — every prod deploy got 401 and logged "continuing without it",
    # running with no event indexing/search while still looking healthy.
    image: opensearchproject/opensearch:2.19.0
    container_name: cybersentineldlp-opensearch
    environment:
      - cluster.name=cybersentineldlp-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:?Set this password in .env file}
      - DISABLE_SECURITY_PLUGIN=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - cybersentineldlp
    # SECURITY: data tier is reachable only on the internal docker
    # network. No host port binding — operators who need local ops
    # access should use `docker compose exec` or bind to 127.0.0.1.
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      # -f is REQUIRED: without it curl exits 0 on an HTTP 401, so a cluster
      # rejecting our credentials still reported "healthy". -f makes auth
      # failures show up as unhealthy instead of hiding behind a green tick.
      test: ["CMD-SHELL", "curl -f -k -u admin:${OPENSEARCH_PASSWORD:?Set this password in .env file} https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # MongoDB for agent data
  mongodb:
    image: mongo:7.0
    container_name: cybersentineldlp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:?Set this password in .env file}
      MONGO_INITDB_DATABASE: cybersentineldlp
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    # ports intentionally omitted — database tier is internal only
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # PostgreSQL for user data
  postgres:
    image: postgres:16-alpine
    container_name: cybersentineldlp-postgres
    environment:
      POSTGRES_USER: cybersentineldlp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set this password in .env file}
      POSTGRES_DB: cybersentineldlp
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    # ports intentionally omitted — internal only
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersentineldlp"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: cybersentineldlp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set this password in .env file} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    # ports intentionally omitted — internal only
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set this password in .env file}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Manager API
  manager:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-manager
    environment:
      # Server
      - PORT=55000
      - WORKERS=4
      - VERSION=2.1.6
      # Run in production mode by default. Without this the app fell back to its
      # "development" default, which skips production-only hardening — wildcard
      # CORS rejection and fail-closed auth when Redis is unavailable. Override
      # to "development" in .env only for local debugging.
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-False}

      # OpenSearch
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?Set this password in .env file}
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false
      - OPENSEARCH_INDEX_PREFIX=cybersentineldlp

      # MongoDB
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=admin
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:?Set this password in .env file}
      - MONGODB_DB=cybersentineldlp

      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cybersentineldlp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set this password in .env file}
      - POSTGRES_DB=cybersentineldlp

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set this password in .env file}

      # JWT & Security
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env file (min 32 chars)}
      - JWT_SECRET=${JWT_SECRET:?Set SECRET_KEY in .env file (min 32 chars)}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION=3600

      # CORS — explicit allowlist only. No wildcard default.
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set (JSON list of allowed origins)}

      # Timezone (display only — storage is always UTC)
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}

      # SSO shared secret for SIEM integration (empty = SSO disabled)
      - DLP_SSO_SECRET=${DLP_SSO_SECRET:-}

      # Initial admin password, used ONLY when seeding the first admin on a
      # brand-new database. Leave empty and the manager generates a random one
      # and logs it once (grep generated_password). Set it from your secrets
      # manager for automated/repeatable deployments.
      - DLP_ADMIN_PASSWORD=${DLP_ADMIN_PASSWORD:-}

      # OneDrive OAuth (optional)
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI:-}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID:-common}
    volumes:
      - ./config:/etc/cybersentineldlp:ro
      - ./server/logs:/var/log/cybersentineldlp
      - ./quarantine:/app/quarantine
      # Persist the (re)trained ML sensitivity model so a retrain survives
      # restarts and image updates. A NAMED volume (not a bind mount) is used
      # deliberately: it inherits the image's dlpuser ownership of /app/ml/models,
      # so the non-root app can write it. A bind mount would be root-owned and
      # the retrain would silently fail to persist.
      - ml_models:/app/ml/models
    ports:
      - "55000:55000"
    depends_on:
      opensearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Dashboard
  dashboard:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-dashboard:latest
    container_name: cybersentineldlp-dashboard
    # nginx inside the container runs as the unprivileged `nginx` user
    # and listens on 3000 (non-privileged port). The host port is
    # configurable via DASHBOARD_HOST_PORT in .env — default 3023.
    # TLS termination, if enabled, should be done by an external
    # reverse proxy (Traefik, Let's Encrypt cert-manager, Caddy) or by
    # adding a mounted nginx-ssl.conf.
    ports:
      - "${DASHBOARD_HOST_PORT:-3023}:3000"
    volumes:
      # Mount TLS certificates as read-only so a future nginx-ssl.conf
      # can pick them up. The bind mount must resolve — install.sh
      # generates a self-signed pair if the operator hasn't provided
      # real ones.
      - ${TLS_CERT_PATH:-./certs}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ${TLS_CERT_PATH:-./certs}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - manager
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      # Bulletproof healthcheck for nginx:alpine running as the
      # unprivileged `nginx` user: check that the nginx master process
      # is alive via `pidof`, a BusyBox applet that always exists in
      # Alpine. No network round-trip, no permission quirks, no
      # dependency on curl/wget command availability. If the nginx
      # master dies, the container is marked unhealthy.
      test: ["CMD-SHELL", "pidof nginx >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-celery-worker
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    environment:
      # OpenSearch
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?Set this password in .env file}
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false

      # MongoDB
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=admin
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:?Set this password in .env file}
      - MONGODB_DB=cybersentineldlp

      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cybersentineldlp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set this password in .env file}
      - POSTGRES_DB=cybersentineldlp

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set this password in .env file}

      # JWT & Security
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env file (min 32 chars)}
      - JWT_SECRET=${JWT_SECRET:?Set SECRET_KEY in .env file (min 32 chars)}

      # CORS — celery-worker imports the same Settings class as the
      # manager, so it also needs this. Without it, pydantic-settings
      # raises ValidationError on startup and the worker exits with
      # code 2 and keeps restarting.
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set (JSON list of allowed origins)}
    volumes:
      - ./server/logs:/var/log/cybersentineldlp
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      manager:
        condition: service_healthy
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-manager:latest
    container_name: cybersentineldlp-celery-beat
    # --pidfile and --schedule both point at /tmp which is always
    # writable by any container user. Previously beat tried to write
    # the schedule file to its CWD (/app) under the unprivileged
    # dlpuser and the healthcheck was polling for a pidfile beat
    # never created — both silent failure modes.
    command: >-
      celery -A app.tasks beat --loglevel=info
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
    environment:
      # OpenSearch — celery-beat imports the full Settings class via
      # `from app.core.config import settings`, which requires every
      # mandatory field to be present at import time. Without these
      # five OPENSEARCH_* vars, pydantic raises ValidationError and
      # beat exits code 2 in a restart loop.
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:?Set this password in .env file}
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set this password in .env file}

      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cybersentineldlp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set this password in .env file}
      - POSTGRES_DB=cybersentineldlp

      # MongoDB
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=admin
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:?Set this password in .env file}
      - MONGODB_DB=cybersentineldlp

      # JWT & Security
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env file (min 32 chars)}
      - JWT_SECRET=${JWT_SECRET:?Set SECRET_KEY in .env file (min 32 chars)}

      # CORS — celery-beat imports the same Settings class (see note
      # on celery-worker above). Required to avoid startup crash loop.
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set (JSON list of allowed origins)}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cybersentineldlp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── Email DLP — outbound SMTP relay ────────────────────────────────────
  # Inspects every outbound message (body + attachments) and rejects with a
  # 550 at DATA when it carries Confidential/Restricted content, so the
  # sending MTA never gets a 250 and the mail is genuinely not delivered.
  # Holds no classification logic — it calls the same
  # /agents/{id}/policy/evaluate endpoint every other channel uses.
  #
  # OPT-IN: this service sits behind the "email-dlp" compose profile, so it does
  # NOT start (and opens no SMTP port) unless you ask for it:
  #   docker compose -f docker-compose.prod.yml --profile email-dlp up -d
  # The vars below use defaults rather than required (:?) guards on purpose — a
  # required guard makes the WHOLE compose file unparseable on any deployment
  # that hasn't set them, which would break `pull`/`down` for every other
  # service. Getting this wrong once already broke an upgrade path.
  #
  # REQUIRED before this enforces anything:
  #   RELAY_AGENT_ID / RELAY_AGENT_KEY — register an agent and paste its
  #   api_key. Without a key the relay cannot authenticate; it refuses to start
  #   rather than silently passing mail it never inspected.
  # With no RELAY_NEXT_HOP_HOST the relay ACCEPTS but does NOT deliver clean
  # mail — correct for testing, wrong for production. See smtp-relay/README.md
  # for the Google Workspace outbound-gateway routing step.
  smtp-relay:
    image: ghcr.io/effaaykhan/cybersentineldlp-prod/dlp-smtp-relay:latest
    container_name: cybersentineldlp-smtp-relay
    profiles: ["email-dlp"]
    networks:
      - cybersentineldlp
    environment:
      - DLP_SERVER_URL=http://manager:55000/api/v1
      - DLP_AGENT_ID=${RELAY_AGENT_ID:-smtp-relay}
      - DLP_AGENT_KEY=${RELAY_AGENT_KEY:-}
      - RELAY_LISTEN_HOST=0.0.0.0
      - RELAY_LISTEN_PORT=10025
      - RELAY_NEXT_HOP_HOST=${RELAY_NEXT_HOP_HOST:-}
      - RELAY_NEXT_HOP_PORT=${RELAY_NEXT_HOP_PORT:-587}
      - RELAY_NEXT_HOP_USER=${RELAY_NEXT_HOP_USER:-}
      - RELAY_NEXT_HOP_PASS=${RELAY_NEXT_HOP_PASS:-}
      - RELAY_NEXT_HOP_STARTTLS=${RELAY_NEXT_HOP_STARTTLS:-true}
      # Opt-in hardening: reject mail whose attachments cannot be read
      # (encrypted archives, scanned-image PDFs, legacy .doc). "Uninspectable"
      # must not silently mean "clean" — but this does bounce some legit mail.
      - RELAY_BLOCK_UNEXTRACTABLE=${RELAY_BLOCK_UNEXTRACTABLE:-false}
      # false = a DLP outage must not stop company mail. Set true to fail closed.
      - RELAY_BLOCK_ON_DLP_ERROR=${RELAY_BLOCK_ON_DLP_ERROR:-false}
    ports:
      - "${RELAY_HOST_PORT:-10025}:10025"
    depends_on:
      manager:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 128M
    restart: unless-stopped

networks:
  cybersentineldlp:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  opensearch_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local
